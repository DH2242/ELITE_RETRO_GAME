<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cartoon Rhythm Jam — Gesture Edition</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Comic Sans MS", system-ui, sans-serif; }
    body {
      background: linear-gradient(135deg, #4f46e5, #ec4899);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .wrapper { display: flex; gap: 20px; align-items: flex-start; }

    .game-wrapper {
      background: #111827;
      border-radius: 20px;
      padding: 20px 30px 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      width: 420px;
    }

    h1 { text-align: center; margin-bottom: 10px; font-size: 26px; text-shadow: 0 3px 0 #000; }
    .subtitle { text-align: center; font-size: 13px; opacity: 0.8; margin-bottom: 15px; }

    .score-bar { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }

    .game-area {
      position: relative;
      width: 100%;
      height: 400px;
      background: radial-gradient(circle at top, #1f2937, #020617);
      border-radius: 16px;
      overflow: hidden;
      border: 3px solid #6d28d9;
    }

    .lane-container {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .lane { border-left: 1px dashed rgba(148,163,184,0.4); border-right: 1px dashed rgba(148,163,184,0.4); position: relative; }
    .lane:nth-child(1) { background: rgba(248,113,113,0.08); }
    .lane:nth-child(2) { background: rgba(251,191,36,0.08); }
    .lane:nth-child(3) { background: rgba(52,211,153,0.08); }
    .lane:nth-child(4) { background: rgba(96,165,250,0.08); }

    .hit-line {
      position: absolute;
      bottom: 60px;
      left: 0;
      right: 0;
      height: 6px;
      background: rgba(249,250,251,0.3);
      box-shadow: 0 0 10px rgba(249,250,251,0.7);
    }

    .note {
      position: absolute;
      width: 60%;
      left: 20%;
      height: 26px;
      border-radius: 999px;
      box-shadow: 0 4px 0 rgba(0,0,0,0.4);
      border: 2px solid rgba(15,23,42,0.8);
    }

    .note.red { background: #f97373; }
    .note.yellow { background: #facc15; }
    .note.green { background: #34d399; }
    .note.blue { background: #60a5fa; }

    .controls { margin-top: 12px; display: flex; justify-content: center; }
    button {
      border: none; border-radius: 999px; padding: 6px 14px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: #22c55e; color: #022c22; box-shadow: 0 4px 0 #15803d;
    }
    button:active { transform: translateY(2px); box-shadow: 0 2px 0 #15803d; }

    .message { margin-top: 6px; font-size: 12px; opacity: 0.9; text-align: center; min-height: 16px; }

    .hit-feedback {
      position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
      font-size: 20px; font-weight: 700; text-shadow: 0 3px 0 #000;
      opacity: 0; transition: opacity 0.15s ease-out, transform 0.15s ease-out;
    }
    .hit-feedback.show { opacity: 1; transform: translate(-50%, -8px); }
    .hit-feedback.good { color: #4ade80; }
    .hit-feedback.ok { color: #facc15; }
    .hit-feedback.miss { color: #f97373; }

    .camera-panel {
      width: 260px;
      background: #1e1e2f;
      padding: 15px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .camera-panel h2 { font-size: 18px; margin-bottom: 10px; text-align: center; }
    #webcam { width: 100%; border-radius: 12px; margin-bottom: 10px; }
    .gesture-display { text-align: center; font-size: 16px; padding: 6px; background: #2d2d44; border-radius: 8px; }
  </style>
</head>

<body>
  <div class="wrapper">

    <div class="game-wrapper">
      <h1>Cartoon Rhythm Jam</h1>
      <div class="subtitle">Use gestures: Left • Fist • Nothing • Right</div>

      <div class="score-bar">
        <div>Score: <span id="score">0</span></div>
        <div>Combo: <span id="combo">0</span></div>
      </div>

      <div class="game-area">
        <div class="lane-container" id="laneContainer">
          <div class="lane"></div>
          <div class="lane"></div>
          <div class="lane"></div>
          <div class="lane"></div>
        </div>
        <div class="hit-line"></div>
        <div id="hitFeedback" class="hit-feedback">GOOD!</div>
      </div>

      <div class="controls">
        <button id="startBtn">Start Song</button>
      </div>

      <div class="message" id="message">Press Start, then use gestures.</div>
    </div>

    <div class="camera-panel">
      <h2>Gesture Input</h2>
      <video id="webcam" autoplay playsinline></video>
      <div class="gesture-display">
        Current Gesture: <span id="gestureLabel">None</span>
      </div>
    </div>

  </div>

  <script src="game.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
  <script src="tm.js"></script>


</body>
</html>
