<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cartoon Rhythm Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Comic Sans MS", system-ui, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4f46e5, #ec4899);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .game-wrapper {
      background: #111827;
      border-radius: 20px;
      padding: 20px 30px 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      width: 420px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 26px;
      text-shadow: 0 3px 0 #000;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      opacity: 0.8;
      margin-bottom: 15px;
    }

    .score-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .game-area {
      position: relative;
      width: 100%;
      height: 400px;
      background: radial-gradient(circle at top, #1f2937, #020617);
      border-radius: 16px;
      overflow: hidden;
      border: 3px solid #6d28d9;
    }

    .lane-container {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .lane {
      border-left: 1px dashed rgba(148, 163, 184, 0.4);
      border-right: 1px dashed rgba(148, 163, 184, 0.4);
      position: relative;
    }

    .lane:nth-child(1) { background: rgba(248, 113, 113, 0.08); }
    .lane:nth-child(2) { background: rgba(251, 191, 36, 0.08); }
    .lane:nth-child(3) { background: rgba(52, 211, 153, 0.08); }
    .lane:nth-child(4) { background: rgba(96, 165, 250, 0.08); }

    .hit-line {
      position: absolute;
      bottom: 60px;
      left: 0;
      right: 0;
      height: 6px;
      background: rgba(249, 250, 251, 0.3);
      box-shadow: 0 0 10px rgba(249, 250, 251, 0.7);
    }

    .note {
      position: absolute;
      width: 60%;
      left: 20%;
      height: 26px;
      border-radius: 999px;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.4);
      border: 2px solid rgba(15, 23, 42, 0.8);
    }

    .note.red    { background: #f97373; }
    .note.yellow { background: #facc15; }
    .note.green  { background: #34d399; }
    .note.blue   { background: #60a5fa; }

    .controls {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .keys {
      display: flex;
      gap: 6px;
    }

    .key {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 2px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      background: #111827;
      box-shadow: 0 3px 0 #000;
    }

    .key.active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #000;
      background: #4b5563;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #22c55e;
      color: #022c22;
      box-shadow: 0 4px 0 #15803d;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #15803d;
    }

    .message {
      margin-top: 6px;
      font-size: 12px;
      opacity: 0.9;
      text-align: center;
      min-height: 16px;
    }

    .hit-feedback {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      font-weight: 700;
      text-shadow: 0 3px 0 #000;
      opacity: 0;
      transition: opacity 0.15s ease-out, transform 0.15s ease-out;
    }

    .hit-feedback.show {
      opacity: 1;
      transform: translate(-50%, -8px);
    }

    .hit-feedback.good { color: #4ade80; }
    .hit-feedback.ok   { color: #facc15; }
    .hit-feedback.miss { color: #f97373; }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <h1>Cartoon Rhythm Jam</h1>
    <div class="subtitle">Hit the notes near the line! Keys: A S D F</div>

    <div class="score-bar">
      <div>Score: <span id="score">0</span></div>
      <div>Combo: <span id="combo">0</span></div>
    </div>

    <div class="game-area">
      <div class="lane-container" id="laneContainer">
        <div class="lane"></div>
        <div class="lane"></div>
        <div class="lane"></div>
        <div class="lane"></div>
      </div>
      <div class="hit-line"></div>
      <div id="hitFeedback" class="hit-feedback">GOOD!</div>
    </div>

    <div class="controls">
      <div class="keys">
        <div class="key" data-key="a">A</div>
        <div class="key" data-key="s">S</div>
        <div class="key" data-key="d">D</div>
        <div class="key" data-key="f">F</div>
      </div>
      <button id="startBtn">Start Song</button>
    </div>

    <div class="message" id="message">Press "Start Song" then use A S D F in time.</div>
  </div>

  <script>
    // --- Basic config ---
    const lanes = 4;
    const laneKeys = ["a", "s", "d", "f"];
    const laneColors = ["red", "yellow", "green", "blue"];

    // Timing (ms)
    const noteSpeed = 0.1; // pixels per ms (tweak for difficulty)
    const spawnInterval = 900; // time between notes
    const hitWindow = 120; // distance in px from hit line for a "hit"

    const gameArea = document.querySelector(".game-area");
    const laneContainer = document.getElementById("laneContainer");
    const scoreEl = document.getElementById("score");
    const comboEl = document.getElementById("combo");
    const messageEl = document.getElementById("message");
    const startBtn = document.getElementById("startBtn");
    const hitFeedback = document.getElementById("hitFeedback");

    const keyEls = {};
    document.querySelectorAll(".key").forEach(el => {
      keyEls[el.dataset.key] = el;
    });

    let notes = [];
    let lastTime = null;
    let running = false;
    let spawnTimer = 0;
    let score = 0;
    let combo = 0;

    function resetGame() {
      notes.forEach(n => n.el.remove());
      notes = [];
      score = 0;
      combo = 0;
      scoreEl.textContent = score;
      comboEl.textContent = combo;
      messageEl.textContent = "Song started! Hit A S D F in time.";
    }

    function spawnNote() {
      const laneIndex = Math.floor(Math.random() * lanes);
      const laneEl = laneContainer.children[laneIndex];

      const noteEl = document.createElement("div");
      noteEl.classList.add("note", laneColors[laneIndex]);
      laneEl.appendChild(noteEl);

      const note = {
        el: noteEl,
        lane: laneIndex,
        y: -30 // start above the top
      };
      notes.push(note);
      updateNotePosition(note);
    }

    function updateNotePosition(note) {
      note.el.style.top = note.y + "px";
    }

    function getHitLineY() {
      const rect = gameArea.getBoundingClientRect();
      const hitLine = document.querySelector(".hit-line");
      const hitRect = hitLine.getBoundingClientRect();
      return hitRect.top - rect.top;
    }

    function gameLoop(timestamp) {
      if (!running) return;

      if (!lastTime) lastTime = timestamp;
      const delta = timestamp - lastTime;
      lastTime = timestamp;

      const hitLineY = getHitLineY();

      // Move notes
      notes.forEach(note => {
        note.y += noteSpeed * delta;
        updateNotePosition(note);
      });

      // Remove notes that passed far below
      notes = notes.filter(note => {
        if (note.y > gameArea.clientHeight + 40) {
          // Missed note
          showHitFeedback("MISS", "miss");
          combo = 0;
          comboEl.textContent = combo;
          note.el.remove();
          return false;
        }
        return true;
      });

      // Spawn new notes
      spawnTimer += delta;
      if (spawnTimer >= spawnInterval) {
        spawnTimer = 0;
        spawnNote();
      }

      requestAnimationFrame(gameLoop);
    }

    function showHitFeedback(text, type) {
      hitFeedback.textContent = text;
      hitFeedback.className = "hit-feedback " + type + " show";
      setTimeout(() => {
        hitFeedback.classList.remove("show");
      }, 150);
    }

    function handleKeyDown(e) {
      const key = e.key.toLowerCase();
      const laneIndex = laneKeys.indexOf(key);
      if (laneIndex === -1) return;

      // Visual key press
      if (keyEls[key]) {
        keyEls[key].classList.add("active");
        setTimeout(() => keyEls[key].classList.remove("active"), 120);
      }

      if (!running) return;

      const hitLineY = getHitLineY();

      // Find closest note in that lane near the hit line
      let bestNote = null;
      let bestDist = Infinity;

      notes.forEach(note => {
        if (note.lane !== laneIndex) return;
        const dist = Math.abs(note.y - hitLineY);
        if (dist < bestDist) {
          bestDist = dist;
          bestNote = note;
        }
      });

      if (bestNote && bestDist <= hitWindow) {
        // Hit!
        const quality = bestDist < hitWindow / 3 ? "GOOD" : "OK";
        const type = quality === "GOOD" ? "good" : "ok";

        showHitFeedback(quality, type);

        // Score logic
        const base = quality === "GOOD" ? 150 : 80;
        combo += 1;
        score += base + combo * 5;

        scoreEl.textContent = score;
        comboEl.textContent = combo;

        // Remove note
        bestNote.el.remove();
        notes = notes.filter(n => n !== bestNote);
      } else {
        // Miss
        showHitFeedback("MISS", "miss");
        combo = 0;
        comboEl.textContent = combo;
      }
    }

    function startGame() {
      if (running) return;
      running = true;
      lastTime = null;
      spawnTimer = 0;
      resetGame();
      requestAnimationFrame(gameLoop);
    }

    startBtn.addEventListener("click", startGame);
    window.addEventListener("keydown", handleKeyDown);
  </script>
</body>
